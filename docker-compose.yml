# cato_deal_intel/docker-compose.yml

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cato-deal-intel-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: pgvector/pgvector:pg16
    container_name: cato-deal-intel-postgres
    environment:
      POSTGRES_USER: deal
      POSTGRES_PASSWORD: deal
      POSTGRES_DB: deal_intel
    ports:
      - "5432:5432"
    volumes:
      - deal_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deal -d deal_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  deal_pgdata: